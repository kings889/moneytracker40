<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Money Tracker</title>

<!-- PWA -->
<link rel="manifest" href="./manifest.json">
<meta name="theme-color" content="#4CAF50">
<link rel="apple-touch-icon" href="icon.png">

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>

<style>
body{margin:0;font-family:sans-serif;background:#f2f2f2}
.center{display:flex;justify-content:center;align-items:center;height:100vh}
.box{width:90%;max-width:350px;background:#fff;padding:20px;border-radius:12px}
.hidden{display:none}
input,select,button{width:100%;padding:10px;margin:6px 0;border-radius:8px;border:1px solid #ccc}
button{background:#4CAF50;color:#fff;border:none}
header{background:#4CAF50;color:#fff;padding:20px;border-radius:0 0 20px 20px}
.summary{display:flex;justify-content:space-between}
.card{background:#fff;margin:10px;padding:12px;border-radius:12px}
.income{color:green}
.expense{color:red}
</style>
</head>

<body>

<div class="center">
<div class="box">
<h2>Money Tracker</h2>
<input id="amount" placeholder="Jumlah">
<select id="type">
<option value="income">Pemasukan</option>
<option value="expense">Pengeluaran</option>
</select>
<button onclick="add()">Tambah</button>

<h3 id="total">0</h3>
</div>
</div>

<script>
let data = JSON.parse(localStorage.getItem("data")||"[]");

function add(){
let t = {
amount:+amount.value,
type:type.value
};
if(!t.amount) return alert("Isi jumlah");

data.push(t);
localStorage.setItem("data",JSON.stringify(data));
render();
}

function render(){
let total=0;
data.forEach(d=>{
total += d.type==="income"?d.amount:-d.amount;
});
document.getElementById("total").innerText="Saldo: "+total;
}

render();
</script>

</body>
</html>
