

<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Money Tracker</title>

<!-- ✅ FIX PWA -->
<link rel="manifest" href="/moneytracker40/manifest.json">
<meta name="theme-color" content="#4CAF50">
<link rel="icon" href="/moneytracker40/icon.png">

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>

<style>
body{margin:0;font-family:sans-serif;background:#f2f2f2}
.center{display:flex;justify-content:center;align-items:center;height:100vh}
.box{width:90%;max-width:350px;background:#fff;padding:20px;border-radius:12px}
.hidden{display:none}
input,select,button{width:100%;padding:10px;margin:6px 0;border-radius:8px;border:1px solid #ccc}
button{background:#4CAF50;color:#fff;border:none}
header{background:#4CAF50;color:#fff;padding:20px;border-radius:0 0 20px 20px}
.summary{display:flex;justify-content:space-between}
.card{background:#fff;margin:10px;padding:12px;border-radius:12px}
.income{color:green}
.expense{color:red}
.fab{position:fixed;bottom:80px;right:20px;width:55px;height:55px;border-radius:50%;background:#4CAF50;color:#fff;font-size:26px}
nav{position:fixed;bottom:0;width:100%;background:#fff;display:flex;justify-content:space-around;padding:12px;border-top:1px solid #ddd}
#modal{position:fixed;top:20%;left:10%;right:10%;background:#fff;padding:15px;border-radius:15px}
</style>
</head>

<body>

<div id="loginPage" class="center">
<div class="box">
<h3>Money Tracker</h3>
<input id="loginEmail" placeholder="Email">
<input id="loginPass" type="password" placeholder="Password">
<button onclick="login()">Login</button>
<p><a onclick="showRegister()">Daftar</a></p>
</div>
</div>

<div id="registerPage" class="center hidden">
<div class="box">
<h3>Daftar</h3>
<input id="regName" placeholder="Nama">
<input id="regEmail" placeholder="Email">
<input id="regPass" type="password" placeholder="Password">
<button onclick="register()">Daftar</button>
<p><a onclick="showLogin()">Login</a></p>
</div>
</div>

<div id="appPage" class="hidden">

<header>
<h2 id="username"></h2>
Saldo: Rp <b id="balance">0</b>

<div class="summary">
<div>Masuk<br><b id="income">0</b></div>
<div>Keluar<br><b id="expense">0</b></div>
</div>
</header>

<div id="home"></div>

<div id="stats" class="hidden card">
<canvas id="chartCanvas"></canvas>
</div>

<div id="profile" class="hidden card">
Target Hemat:
<input type="number" id="limitInput">
<button onclick="saveLimit()">Simpan</button>
<button onclick="logout()">Logout</button>
</div>

<button class="fab" onclick="openModal()">+</button>

<nav>
<div onclick="showPage('home')">Home</div>
<div onclick="showPage('stats')">Stats</div>
<div onclick="showPage('profile')">Profile</div>
</nav>

<div id="modal" class="hidden">
<input type="date" id="dateInput">
<input type="number" id="amountInput" placeholder="Jumlah">

<select id="typeInput" onchange="updateCategory()">
<option value="income">💰 Pemasukan</option>
<option value="expense">💸 Pengeluaran</option>
</select>

<select id="catInput"></select>

<button onclick="addTrx()">Simpan</button>
<button onclick="closeModal()">Batal</button>
</div>

</div>

<script>
let currentUser=null;
let chart=null;

function showRegister(){loginPage.classList.add("hidden");registerPage.classList.remove("hidden")}
function showLogin(){registerPage.classList.add("hidden");loginPage.classList.remove("hidden")}

function register(){
let users=JSON.parse(localStorage.getItem("users")||"[]");
let user={name:regName.value,email:regEmail.value,pass:regPass.value};
users.push(user);
localStorage.setItem("users",JSON.stringify(users));
Swal.fire("Berhasil");
showLogin();
}

function login(){
let users=JSON.parse(localStorage.getItem("users")||"[]");
let user=users.find(u=>u.email===loginEmail.value && u.pass===loginPass.value);
if(!user) return Swal.fire("Login gagal");
currentUser=user.email;
localStorage.setItem("session",currentUser);
startApp(user);
}

function startApp(user){
loginPage.classList.add("hidden");
appPage.classList.remove("hidden");
username.innerText="Halo "+user.name;
updateCategory();
render();
}

function getData(){return JSON.parse(localStorage.getItem("trx_"+currentUser)||"[]")}
function saveData(d){localStorage.setItem("trx_"+currentUser,JSON.stringify(d))}

function updateCategory(){
let type = document.getElementById("typeInput").value;
let cat = document.getElementById("catInput");

if(type==="income"){
cat.innerHTML = `
<option>💵 Uang Saku</option>
<option>🎓 Beasiswa</option>
<option>🧑‍💻 Part-time</option>
<option>📦 Lainnya</option>`;
}else{
cat.innerHTML = `
<option>🏫 Kas</option>
<option>📚 Buku</option>
<option>🚌 Transport</option>
<option>🍜 Jajan</option>
<option>📦 Lainnya</option>`;
}
}

function addTrx(){
let data=getData();

let t={
date:dateInput.value,
amount:+amountInput.value,
type:typeInput.value,
cat:catInput.value
};

if(!t.amount) return Swal.fire("Isi jumlah");

data.push(t);
saveData(data);

if(t.type === "expense"){
let totalExp = data.filter(x=>x.type==="expense").reduce((a,b)=>a+b.amount,0);
let limit = +localStorage.getItem("limit_"+currentUser)||0;
if(limit && totalExp > limit){
Swal.fire("⚠️ Hemat!","Pengeluaran melebihi target","warning");
}
}

closeModal();
render();
}

function openModal(){modal.classList.remove("hidden")}
function closeModal(){modal.classList.add("hidden")}

function saveLimit(){
localStorage.setItem("limit_"+currentUser,limitInput.value);
Swal.fire("Tersimpan");
}

function render(){
let data=getData();
let inc=0,exp=0;
home.innerHTML="";

data.forEach((t)=>{
if(t.type==="income") inc+=t.amount;
else exp+=t.amount;

home.innerHTML+=`
<div class="card">
<b>${t.cat}</b><br>
${t.date}<br>
<span class="${t.type}">Rp ${t.amount}</span>
</div>`;
});

balance.innerText=inc-exp;
income.innerText=inc;
expense.innerText=exp;

if(chart) chart.destroy();
chart=new Chart(chartCanvas,{
type:"bar",
data:{labels:["Masuk","Keluar"],datasets:[{data:[inc,exp]}]}
});
}

function showPage(p){
["home","stats","profile"].forEach(id=>{
document.getElementById(id).classList.add("hidden");
});
document.getElementById(p).classList.remove("hidden");
}

function logout(){localStorage.removeItem("session");location.reload()}

window.onload=()=>{
let s=localStorage.getItem("session");
if(s){
currentUser=s;
let users=JSON.parse(localStorage.getItem("users")||"[]");
let user=users.find(u=>u.email===s);
startApp(user);
}
};
</script>

</body>
</html>
